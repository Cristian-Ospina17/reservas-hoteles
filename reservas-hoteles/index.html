<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HotelApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container">

<a class="navbar-brand">HotelApp</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#hoteles">Hoteles</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#reserva">Reserva</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<div class="container text-center">

<h1 class="titulo">Encuentra tu hotel ideal</h1>

<input
type="text"
id="buscador"
class="form-control buscador"
placeholder="Buscar hotel o ciudad..."
>

</div>

</section>

<!-- HOTELES -->

<section id="hoteles" class="container mt-5">

<h2 class="text-center mb-4">Hoteles disponibles</h2>

<div class="row" id="hotelContainer"></div>

</section>

<!-- RESERVA -->

<section id="reserva" class="container mt-5">

<h2 class="text-center mb-4">Reservar Hotel</h2>

<div class="row justify-content-center">

<div class="col-md-7">

<form id="formReserva" class="card p-4 shadow">

<input
type="text"
id="nombre"
class="form-control mb-3"
placeholder="Nombre completo"
required
>

<input
type="email"
id="email"
class="form-control mb-3"
placeholder="Correo electrónico"
required
>

<label>Hotel</label>
<select id="hotelSeleccionado" class="form-control mb-3"></select>

<label>Fecha de entrada</label>
<input type="date" id="fechaEntrada" class="form-control mb-3">

<label>Fecha de salida</label>
<input type="date" id="fechaSalida" class="form-control mb-3">

<div class="row">

<div class="col-md-6">

<label>Personas</label>
<input type="number" id="personas" class="form-control mb-3" value="1" min="1">

</div>

<div class="col-md-6">

<label>Habitaciones</label>
<input type="number" id="habitaciones" class="form-control mb-3" value="1" min="1">

</div>

</div>

<button class="btn btn-primary w-100">
Reservar
</button>

</form>

</div>

</div>

</section>

<script src="app.js"></script>

</body>
</html>

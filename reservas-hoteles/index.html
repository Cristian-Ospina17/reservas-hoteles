<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reservas de Hoteles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =============================
INTEGRANTE 1
NAVBAR
============================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand">HotelApp</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#hoteles">Hoteles</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#reserva">Reserva</a>
</li>

</ul>

</div>

</div>
</nav>


<!-- =============================
TITULO
============================= -->

<section class="container mt-5">

<h1 class="text-center">
Sistema de Reserva de Hoteles
</h1>

</section>
<!-- =============================
INTEGRANTE 2
LISTA DE HOTELES
============================= -->

<section id="hoteles" class="container mt-5">

<h2 class="text-center mb-4">Hoteles disponibles</h2>

<div class="row" id="hotelContainer"></div>

</section>
<!-- =============================
INTEGRANTE 4
FORMULARIO DE RESERVA
============================= -->

<section id="reserva" class="container mt-5">

<h2>Reservar Hotel</h2>

<form id="formReserva">

<input
type="text"
id="nombre"
placeholder="Nombre"
class="form-control mb-2"
>

<input
type="email"
id="email"
placeholder="Email"
class="form-control mb-2"
>

<button class="btn btn-success">
Reservar
</button>

</form>

</section>

<script src="app.js"></script>

</body>
</html>
